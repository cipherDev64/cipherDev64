<svg xmlns="http://www.w3.org/2000/svg" width="840" height="120" viewBox="0 0 840 120">
  <!-- Icon collection — consistent 24x24, 1.5px stroke, #FAFAFA primary / #DC2626 accent -->

  <!-- Code / Terminal -->
  <g transform="translate(60, 48)">
    <polyline points="6,6 0,12 6,18" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="18,6 24,12 18,18" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="14" y1="4" x2="10" y2="20" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Brain / AI -->
  <g transform="translate(150, 48)">
    <circle cx="12" cy="12" r="10" stroke="#FAFAFA" stroke-width="1.5" fill="none"/>
    <path d="M8 4 Q8 12 8 20" stroke="#FAFAFA" stroke-width="1" fill="none"/>
    <path d="M16 4 Q16 12 16 20" stroke="#FAFAFA" stroke-width="1" fill="none"/>
    <line x1="2" y1="12" x2="22" y2="12" stroke="#DC2626" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Rocket / Launch -->
  <g transform="translate(240, 48)">
    <path d="M12 2 C7 7 5 13 5 19 L12 15 L19 19 C19 13 17 7 12 2Z" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <circle cx="12" cy="10" r="2" fill="#DC2626"/>
  </g>

  <!-- Layers / Stack -->
  <g transform="translate(330, 48)">
    <polygon points="12,2 22,7 12,12 2,7" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <polyline points="2,12 12,17 22,12" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <polyline points="2,17 12,22 22,17" stroke="#DC2626" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- User / Person -->
  <g transform="translate(420, 48)">
    <circle cx="12" cy="7" r="4" stroke="#FAFAFA" stroke-width="1.5" fill="none"/>
    <path d="M4 22 C4 17 8 13 12 13 S20 17 20 22" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Trophy / Achievement -->
  <g transform="translate(510, 48)">
    <path d="M6 2 L18 2 L18 10 C18 14 15 17 12 17 S6 14 6 10Z" stroke="#FAFAFA" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <line x1="12" y1="17" x2="12" y2="21" stroke="#FAFAFA" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8" y1="21" x2="16" y2="21" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Book / Learning -->
  <g transform="translate(600, 48)">
    <path d="M2 4 C5 2 9 2 12 4 S19 2 22 4 L22 19 C19 17 15 17 12 19 S5 17 2 19Z" stroke="#FAFAFA" stroke-width="1.5" fill="none"/>
    <line x1="12" y1="4" x2="12" y2="19" stroke="#DC2626" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Mail / Contact -->
  <g transform="translate(690, 48)">
    <rect x="2" y="5" width="20" height="14" rx="2" stroke="#FAFAFA" stroke-width="1.5" fill="none"/>
    <polyline points="2,5 12,14 22,5" stroke="#DC2626" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- Map Pin / Location -->
  <g transform="translate(780, 48)">
    <path d="M12 2 C7 2 3 6 3 11 C3 17 12 22 12 22 S21 17 21 11 C21 6 17 2 12 2Z" stroke="#FAFAFA" stroke-width="1.5" fill="none"/>
    <circle cx="12" cy="10" r="3" stroke="#DC2626" stroke-width="1.5" fill="none"/>
  </g>
</svg>
