<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="bg-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="0.6" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
    <pattern id="bg-cross" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="19" y1="20" x2="21" y2="20" stroke="#FFFFFF" stroke-width="0.3" opacity="0.02"/>
      <line x1="20" y1="19" x2="20" y2="21" stroke="#FFFFFF" stroke-width="0.3" opacity="0.02"/>
    </pattern>
  </defs>

  <rect width="200" height="200" fill="#09090B"/>
  <rect width="200" height="200" fill="url(#bg-grid)"/>
  <rect width="200" height="200" fill="url(#bg-cross)"/>
</svg>
