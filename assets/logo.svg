<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 80 80">
  <defs>
    <linearGradient id="logo-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27272A"/>
      <stop offset="50%" stop-color="#DC2626" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#27272A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="80" height="80" rx="14" fill="#09090B"/>
  <rect x="0.5" y="0.5" width="79" height="79" rx="13.5" fill="none" stroke="url(#logo-border)" stroke-width="1"/>

  <!-- Geometric A — clean, minimal -->
  <path d="M28 58 L40 22 L52 58" stroke="#FAFAFA" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="32" y1="46" x2="48" y2="46" stroke="#DC2626" stroke-width="2" stroke-linecap="round"/>

  <!-- Dot accent above -->
  <circle cx="40" cy="16" r="2" fill="#DC2626" opacity="0.8"/>
</svg>
